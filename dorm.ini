<script> 
function toggleInputField(selectElement) {
    var inputField = document.getElementById("new_department");

    if (selectElement.name === "department_name[]") {
        if (selectElement.value === "other") {
            inputField.style.display = "block";
            inputField.setAttribute("required", "true");
        } else {
            inputField.style.display = "none";
            inputField.removeAttribute("required");
        }
    }

    var selectedItemsField = document.getElementById("selected_items");
    var selectedItems = [];
    var selects = document.querySelectorAll('select');
    selects.forEach(function(select) {
        if (select.value !== "" && select.value !== "other") {
            var optionText = select.options[select.selectedIndex].text;
            selectedItems.push(optionText);
        } else if (select.value === "other" && select.previousElementSibling.value !== "") {
            selectedItems.push(select.previousElementSibling.value);
        }
    });
    selectedItemsField.value = selectedItems.join(", ");
}

function updateCompanyName() {
    var companyCodeSelect = document.getElementsByName('company_code[]')[0];
    var companyNameInput = document.getElementById('company_name');
    var selectedIndex = companyCodeSelect.selectedIndex;
    var companyCode = companyCodeSelect.options[selectedIndex].value;

    // Ajax call to fetch company name
    var xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
        if (xhr.readyState == XMLHttpRequest.DONE) {
            if (xhr.status == 200) {
                companyNameInput.value = xhr.responseText;
            }
        }
    };
    xhr.open("GET", "get_company_name.php?company_code=" + companyCode, true);
    xhr.send();
}

var companyCodeSelect = document.getElementsByName('company_code[]')[0];
companyCodeSelect.addEventListener('change', updateCompanyName);
</script>

