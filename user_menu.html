        }

        .homepage .icon {
            display: none;
        }

        .dropdown {
            float: left;

        }

        .dropdown .dropbtn {
            font-size: 17px;
            border: none;
            outline: none;
            color: white;
            padding: 14px 16px;
            background-color: inherit;
            font-family: inherit;
            margin: 0;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .dropdown-content a {
            float: none;
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        .homepage a:hover, .dropdown:hover .dropbtn {
            background-color: #555;
            color: white;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
            color: black;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .search-container {
            position: relative;
            float: right;
            margin-top: 5px;
            margin-right: 200px;
        }

        .homepage #search {
            padding: 8px 40px 8px 16px;
            border: 1px solid rgba(0, 0, 0, 0.25);
            border-radius: 25px;
            outline: 0;
        }

        .homepage #search-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
        }

        .homepage #logout {
            position: fixed;
            right: 0px;
            top: 0px;
            background-color: #f79345;
            color: white;
            display: block;
        }

        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Επιθυμητό ύψος για κέντραρισμα κατακόρυφα */
        }

        .main * {
            text-align: center; /* Κεντράρει κάθε στοιχείο μέσα στην .main οριζόντια */
        }

        .main h1 {  
            float: left;
            display: block;
            color: #333;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 30px;
        }

        @media screen and (max-width: 600px) {
            .homepage a:not(:first-child), .dropdown .dropbtn {
                display: none;
            }

            .homepage a.icon {
                float: right;
                display: block;
            }
        }

        @media screen and (max-width: 600px) {
            .homepage.responsive { position: relative; }

            .homepage.responsive .icon {
                position: absolute;
                right: 0;
                top: 0;
            }

            .homepage.responsive a {
                float: none;
                display: block;
                text-align: left;
            }

            .homepage.responsive .dropdown { float: none; }

            .homepage.responsive .dropdown-content { position: relative; }

            .homepage.responsive .dropdown .dropbtn {
                display: block;
                width: 100%;
                text-align: left;
            }
        }
    </style>
</head>
<body>
<div class="homepage" id="myhomepage">
    <a href="./user.php" class="active">Αρχική Σελίδα</a>
    <div class="dropdown">

            <!-- Εικονίδιο που θα εκτελεί την αναζήτηση όταν γίνει κλικ -->
            <i class="fas fa-search" id="search-icon"></i>
        </form>
    </div>
    <a href="./logout.php" id="logout">Αποσύνδεση</a>

</div>
<script src="search.js"></script>

<script>
    function myFunction() {
        var x = document.getElementById("myhomepage");
        if (x.className === "homepage") {
            x.className += " responsive";
        } else {
            x.className = "homepage";
        }
    }
</script>
